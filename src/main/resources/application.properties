spring.application.name=Task Management System
server.port= 8080
spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanagementsystem
spring.datasource.username=postgres
spring.datasource.password=root123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

jwt.token.ttl=86400000
jwt.secretkey=SUPEREXTRACHOICE

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


server.tomcat.connection-timeout=3s
security.whitelist =/auth/**,/swagger-ui/**,/swagger-ui.html,/v2/api-docs,/v3/api-docs,\
  /v3/api-docs/swagger-config,/swagger-resources/**,/webjars/**, /ws/**, /index.html, /
